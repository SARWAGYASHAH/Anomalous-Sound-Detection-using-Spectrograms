# ============================================================
# environment.yml - Conda environment for reproducibility
# Usage: conda env create -f environment.yml
#        conda activate anomaly-sound
# ============================================================

name: anomaly-sound
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # ---------- Python ----------
  - python=3.10

  # ---------- Core ML / Deep Learning ----------
  - pytorch>=2.0.0
  - torchaudio>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - scikit-learn>=1.2.0

  # ---------- Audio Processing ----------
  - librosa>=0.10.0

  # ---------- Data & Config ----------
  - pyyaml>=6.0
  - pandas>=2.0.0

  # ---------- Visualization ----------
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ---------- Utilities ----------
  - tqdm>=4.65.0
  - pillow>=9.5.0

  # ---------- Testing ----------
  - pytest>=7.3.0
  - pytest-cov>=4.1.0

  # ---------- pip-only packages ----------
  - pip:
      - mlflow>=2.10.0
      - soundfile>=0.12.0
